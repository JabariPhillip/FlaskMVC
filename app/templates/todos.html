{% extends "authenticated-base.html" %} {% block subpage_content %}
<div class="container-fluid">
  <div class="card shadow-sm p-4">
    <h2 class="fw-bold mb-3">My Todos</h2>

    <form method="POST" action="/todos" class="mb-4">
      <div class="d-flex gap-2">
        <input
          type="text"
          name="title"
          class="form-control"
          placeholder="Enter a new todo..."
          required
        />
        <button type="submit" class="btn btn-primary">Add</button>
      </div>
    </form>

    {% if todos %}
    <ul class="list-group">
      {% for todo in todos %}
      <li
        class="list-group-item d-flex justify-content-between align-items-center"
      >
        <div>
          <span
            class="{% if todo.completed %}text-decoration-line-through text-muted{% endif %}"
          >
            {{ todo.title }}
          </span>
          {% if todo.completed %}
          <span class="badge bg-success ms-2">Done</span>
          {% else %}
          <span class="badge bg-warning text-dark ms-2">Pending</span>
          {% endif %}
        </div>

        <div class="d-flex gap-2">
          <form method="POST" action="/todos/{{ todo.id }}/toggle" class="m-0">
            <button type="submit" class="btn btn-sm btn-outline-success">
              {% if todo.completed %}Undo{% else %}Done{% endif %}
            </button>
          </form>

          <form method="POST" action="/todos/{{ todo.id }}/delete" class="m-0">
            <button type="submit" class="btn btn-sm btn-outline-danger">
              Delete
            </button>
          </form>
        </div>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="text-muted mb-0">No todos yet.</p>
    {% endif %}
  </div>
</div>
{% endblock %}
